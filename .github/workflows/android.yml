name: Android Building

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        
      - name: Build Unsigned Release APKs with Gradle
        run: bash ./gradlew :wallet:assembleRelease :wallet:assembleMetaRelease :wearablesMeta:assembleRelease --stacktrace
      
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: vergexvr
          path: ./wallet/build/outputs/apk/release/wallet-release-unsigned.apk

      - name: Upload Meta APK
        uses: actions/upload-artifact@v4
        with:
          name: vergexvr-meta
          path: ./wallet/build/outputs/apk/metaRelease/wallet-metaRelease-unsigned.apk

      - name: Upload Wearables Meta APK
        uses: actions/upload-artifact@v4
        with:
          name: vergexvr-wearables-meta
          path: ./wearablesMeta/build/outputs/apk/release/
